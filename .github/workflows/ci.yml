name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    name: unit test
  runs-on: ubuntu-latest

  steps:
    - name: checkout code
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: '24'
    - name: Install packages
    - run: npm ci
    - name: Run tests
    - run: npm run test

  build:
    name: build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout code
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '24'
      - name: Install packages
      - run: npm ci
      - name: run build
      - run: npm run build
