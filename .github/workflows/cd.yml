name: Deployment

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run_head_branch == 'main'
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: login to dockerhub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: build image
        run: |
          docker build \
          -f ./Dockerfile.prod \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/nestjs-app:latest \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/nestjs-app:${{ github.sha }}
      - name: push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/nestjs-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/nestjs-app:${{ github.sha }}

  prepare-configs:
    name: Copy Configs
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: copy config files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "docker-compose.yml, nginx/*"
          target: "home/ubuntu/app"
          strip_components: 1
      - name: Create .env file
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cat > /home/ubuntu/app/.env <<EOF
            NODE_ENV=${{ secrets.NODE_ENV }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USER=${{ secrets.MAIL_USER }}
            Node_Mailer_Main_Pass=${{ secrets.MAIL_PASSWORD }}
            MAIL_FROM=${{ secrets.MAIL_FROM }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_BUCKET_NAME=${{ secrets.AWS_BUCKET_NAME }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            EOF

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: prepare-configs
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/app
            sudo docker-compose pull
            sudo docker-compose up -d
            sudo docker image prune -af